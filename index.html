<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Setup Guide</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='70' font-size='70'>🤖</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:#0B0B0D;color:#F2F2F2;font-size:16px;line-height:1.7;font-weight:300;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0}
    header{padding:24px 32px 16px;text-align:left;position:relative;z-index:1}
    header a{color:#F2F2F2;text-decoration:none;font-size:15px;font-weight:500;letter-spacing:-.2px}
    header a:hover{color:#AAAAAA}
    .w{max-width:720px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1}
    h1{font-size:24px;font-weight:300;line-height:1.4;margin-bottom:8px;letter-spacing:-.02em;color:#F2F2F2}
    h2{font-size:19px;font-weight:300;margin:36px 0 12px;letter-spacing:-.02em;color:#F2F2F2}
    .subtitle{color:#AAAAAA;font-size:15px;margin-bottom:32px;line-height:1.6}
    .hint{color:#AAAAAA;font-size:14px;line-height:1.6;margin:4px 0 16px}
    p{margin-bottom:16px;color:#AAAAAA}
    a{color:#F2F2F2}
    code{font-family:'IBM Plex Mono',Menlo,monospace;font-size:14px;background:rgba(255,255,255,0.08);color:#F2F2F2;padding:2px 5px;border-radius:3px}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.2px;text-transform:uppercase}
    .badge-easy{background:rgba(34,197,94,0.15);color:#4ade80}
    .badge-medium{background:rgba(234,179,8,0.15);color:#facc15}
    .badge-technical{background:rgba(239,68,68,0.15);color:#f87171}
    .badge-free{background:rgba(74,158,255,0.1);color:#93c5fd;font-weight:400;text-transform:none}
    .badge-paid{background:rgba(168,85,247,0.1);color:#c084fc;font-weight:400;text-transform:none}
    .time-est{font-size:12px;color:#666666;margin-left:4px}

    /* Reassurance banners */
    .reassure{background:rgba(34,197,94,0.08);border-left:3px solid rgba(34,197,94,0.4);padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0 24px;font-size:14px;color:#86efac;line-height:1.6}
    .reassure-calm{background:rgba(74,158,255,0.08);border-left-color:rgba(74,158,255,0.4);color:#93c5fd}
    .reassure-warn{background:rgba(234,179,8,0.08);border-left-color:rgba(234,179,8,0.4);color:#fcd34d}

    /* Prerequisite cards */
    .prereq{background:rgba(20,20,22,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:14px;margin:16px 0;overflow:hidden;transition:border-color .2s;backdrop-filter:blur(20px)}
    .prereq.done{border-color:rgba(34,197,94,0.3)}
    .prereq-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;user-select:none}
    .prereq-header:hover{background:rgba(255,255,255,0.04)}
    .prereq-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
    .prereq-icon{font-size:24px;flex-shrink:0}
    .prereq-info{flex:1;min-width:0}
    .prereq-title{font-size:16px;font-weight:400;margin-bottom:2px;color:#F2F2F2}
    .prereq-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .prereq-check{width:28px;height:28px;border-radius:50%;border:2px solid #666666;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s}
    .prereq.done .prereq-check{border-color:#22c55e;background:#22c55e;color:#fff}
    .prereq-body{display:none;padding:0 24px 24px;border-top:1px solid rgba(255,255,255,0.06)}
    .prereq-body.open{display:block}
    .prereq-body p{font-size:14px;color:#AAAAAA;line-height:1.7;margin-bottom:12px}
    .prereq-body ol{margin:0 0 16px 20px}
    .prereq-body ol li{font-size:14px;color:#AAAAAA;margin-bottom:8px;line-height:1.6}
    .prereq-body ol li strong{color:#F2F2F2}

    /* Inputs */
    label{display:block;font-size:13px;color:#AAAAAA;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:400;font-family:'IBM Plex Sans',system-ui,sans-serif}
    input,select{display:block;width:100%;padding:12px 14px;font-size:15px;font-family:'IBM Plex Mono',Menlo,monospace;border:1px solid rgba(255,255,255,0.08);border-radius:10px;background:rgba(40,40,45,0.6);color:#F2F2F2;margin:0 0 8px;transition:border-color .15s}
    input:focus,select:focus{outline:none;border-color:rgba(255,255,255,0.2)}
    input::placeholder{color:#666666}
    select option{background:#1a1a1f;color:#F2F2F2}
    .input-text{font-family:'IBM Plex Sans',system-ui,sans-serif}
    .example{font-family:'IBM Plex Mono',Menlo,monospace;font-size:12px;color:#666666;background:rgba(255,255,255,0.04);padding:8px 12px;border-radius:6px;margin:0 0 8px;word-break:break-all}
    .warn{color:#f87171;font-size:14px;margin:4px 0 12px;display:none}
    .warn.show{display:block}

    /* OS toggle */
    .os-toggle{display:inline-flex;border:1px solid rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;margin:8px 0 16px}
    .os-btn{padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:none;color:#666666;transition:all .15s}
    .os-btn.active{background:#F2F2F2;color:#0B0B0D}
    .os-btn:not(:last-child){border-right:1px solid rgba(255,255,255,0.08)}

    /* Command boxes */
    .cmd{font-family:'IBM Plex Mono',Menlo,monospace;font-size:13px;background:rgba(10,10,12,0.95);color:#F2F2F2;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px 16px;margin:12px 0 16px;white-space:pre-wrap;word-break:break-all;line-height:1.6;cursor:pointer;position:relative;transition:opacity .15s}
    .cmd:hover{opacity:.9}
    .cmd::after{content:'click to copy';position:absolute;right:12px;top:12px;font-size:10px;color:#666666;font-weight:400;text-transform:uppercase;letter-spacing:.5px}
    .cmd:hover::after{color:#AAAAAA}

    /* Message copy box */
    .msg-box{background:rgba(20,20,22,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:0;margin:16px 0;position:relative;overflow:hidden;backdrop-filter:blur(20px)}
    .msg-box-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03)}
    .msg-box-title{font-size:12px;color:#666666;font-weight:400;text-transform:uppercase;letter-spacing:.5px}
    .msg-box-copy{padding:6px 14px;font-size:12px;font-weight:500;background:#F2F2F2;color:#0B0B0D;border:none;border-radius:6px;cursor:pointer;width:auto;margin:0;transition:all .15s}
    .msg-box-copy:hover{opacity:.8}
    .msg-box-body{padding:20px 24px;white-space:pre-wrap;word-break:break-word;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#AAAAAA;font-size:13.5px;line-height:1.8}
    .msg-box-body code{font-size:12px;background:rgba(255,255,255,0.08);color:#F2F2F2;padding:1px 5px;border-radius:3px}
    .connect-cards{display:grid;gap:16px;margin:20px 0}
    .connect-card{background:rgba(20,20,22,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px;transition:border-color .15s;backdrop-filter:blur(20px)}
    .connect-card:hover{border-color:rgba(255,255,255,0.15)}
    .connect-card h3{font-size:16px;font-weight:400;margin-bottom:6px;display:flex;align-items:center;gap:8px;color:#F2F2F2}
    .connect-card p{font-size:13px;color:#AAAAAA;line-height:1.6;margin-bottom:8px}
    .connect-card .cmd{margin:8px 0 4px;font-size:12px;padding:10px 14px}
    .connect-card ol{margin:8px 0 0 18px}
    .connect-card ol li{font-size:13px;color:#AAAAAA;margin-bottom:4px}
    .dl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:16px 0}
    .dl-card{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(20,20,22,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:10px;text-decoration:none;color:#F2F2F2;font-size:14px;font-weight:400;transition:border-color .15s;backdrop-filter:blur(20px)}
    .dl-card:hover{border-color:rgba(255,255,255,0.15)}
    .dl-card .dl-icon{font-size:20px}

    /* Buttons */
    button{display:block;width:100%;padding:16px;font-size:16px;font-weight:500;background:#F2F2F2;color:#0B0B0D;border:none;border-radius:10px;cursor:pointer;margin-top:24px;transition:opacity .15s;font-family:'IBM Plex Sans',system-ui,sans-serif}
    button:hover{opacity:.9}
    button:disabled{background:rgba(40,40,45,0.6);color:#666666;cursor:not-allowed;opacity:1}
    .back{font-size:13px;color:#666666;margin-top:12px;cursor:pointer;text-decoration:none;display:inline-block}
    .back:hover{color:#AAAAAA}

    /* Pick cards */
    .pick{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0 0 24px}
    .pick-card{padding:24px 20px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);border-radius:14px;transition:all .15s;background:rgba(20,20,22,0.85);backdrop-filter:blur(20px)}
    .pick-card:hover{border-color:rgba(255,255,255,0.15)}
    .pick-card.on{border-color:rgba(255,255,255,0.3)}
    .pick .icon{font-size:24px;margin-bottom:10px}
    .pick .title{font-size:15px;font-weight:400;margin-bottom:4px;color:#F2F2F2}
    .pick .desc{font-size:13px;color:#AAAAAA;line-height:1.5}

    /* Progress tracker */
    .progress-bar{display:flex;align-items:center;gap:8px;margin-bottom:32px}
    .progress-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1);transition:background .2s}
    .progress-dot.active{background:#F2F2F2}
    .progress-dot.done{background:#22c55e}
    .progress-line{flex:1;height:2px;background:rgba(255,255,255,0.1)}

    /* Spinner */
    .spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:#F2F2F2;border-radius:50%;animation:s .7s linear infinite;margin:40px auto 16px}
    @keyframes s{to{transform:rotate(360deg)}}
    .st{text-align:center;color:#AAAAAA;font-size:15px}

    /* Error box */
    .error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:24px;margin:32px 0;display:none}
    .error-box.show{display:block}
    .error-box h3{font-size:16px;color:#f87171;margin-bottom:8px;font-weight:400}
    .error-box p{font-size:14px;color:#fca5a5;margin-bottom:12px;line-height:1.6}
    .error-box a{color:#f87171}
    .error-box button{background:#ef4444;color:#fff;margin-top:16px}
    .error-box button:hover{opacity:.9}

    /* Success box */
    .success-box{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:32px;margin:20px 0;text-align:center}
    .success-box .icon{font-size:48px;margin-bottom:12px}
    .success-box h3{font-size:18px;font-weight:400;margin-bottom:8px;color:#F2F2F2}
    .success-box p{font-size:14px;color:#AAAAAA;line-height:1.6;margin-bottom:0}

    /* Section cards */
    .section-card{background:rgba(20,20,22,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px;margin:20px 0;backdrop-filter:blur(20px);transition:border-color .15s}
    .section-card:hover{border-color:rgba(255,255,255,0.15)}
    .section-card h3{font-size:16px;font-weight:400;margin-bottom:8px;color:#F2F2F2}
    .section-card p{font-size:14px;color:#AAAAAA;line-height:1.6;margin-bottom:12px}
    .section-card ol{margin:8px 0 16px 20px}
    .section-card ol li{font-size:13px;color:#AAAAAA;margin-bottom:6px}

    /* Cover */
    .cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:0 24px}
    .cover-brand{font-size:32px;font-weight:300;letter-spacing:-.03em;margin-bottom:40px;color:#F2F2F2;font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
    .cover-tagline{font-size:18px;color:#AAAAAA;margin-bottom:16px;line-height:1.5;font-weight:300}
    .cover-tagline a{color:#AAAAAA;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2);text-underline-offset:2px}
    .cover-tagline a:hover{color:#F2F2F2;text-decoration-color:rgba(255,255,255,0.4)}
    .cover-time{font-size:14px;color:#666666;margin-bottom:48px}
    .cover-start{display:inline-block;padding:16px 56px;font-size:16px;font-weight:500;background:#F2F2F2;color:#0B0B0D;border:none;border-radius:10px;cursor:pointer;text-decoration:none;width:auto;transition:opacity .15s;font-family:'IBM Plex Sans',system-ui,sans-serif}
    .cover-start:hover{opacity:.9}
    .existing-link{font-size:14px;color:#666666;margin-top:28px;text-align:center}
    .existing-link a{color:#666666;text-decoration:underline}
    .existing-link a:hover{color:#AAAAAA}
    .cover-powered{position:fixed;bottom:28px;right:32px;z-index:1}

    /* Step list */
    .step-list{margin:0 0 24px;padding:0;list-style:none;font-size:14px;line-height:1.7;color:#AAAAAA}
    .step-list li{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .step-list li:last-child{border-bottom:none}
    .step-list .num{color:#F2F2F2;font-weight:400;margin-right:8px}

    /* Footer */
    footer{text-align:right;padding:0 32px 28px;position:relative;z-index:1}
    footer a{text-decoration:none}
    .footer-brand{display:inline-flex;align-items:center;gap:5px;opacity:.4;transition:opacity .2s}
    .footer-brand:hover{opacity:.7}
    .footer-brand img{height:14px;width:auto}
    .footer-brand span{color:#666666;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:400}

    hr{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:32px 0}
    @media(max-width:520px){.pick{grid-template-columns:1fr}h1{font-size:21px}.cover-brand{font-size:26px}footer{padding:0 20px 20px}.prereq-header{padding:16px}.prereq-meta{gap:4px}}
  </style>
</head>
<body>
<header><a href="/" onclick="goHome();return false"><img src="https://usemyclaw.com/logo-64.png" alt="" style="height:20px;width:20px;vertical-align:middle;margin-right:6px;opacity:0.7">BotSetupGuide.com</a></header>
<div class="w" id="app"></div>
<footer>
  <a class="footer-brand" href="https://humanitylabs.org" target="_blank">
    <span>powered by</span>
    <img src="/humanity-labs-logo.png" alt="Humanity Labs">
  </a>
</footer>
<script>
const S={v:'s0',path:null,mode:null,os:'mac',claude:'',brave:'',hkey:'',tgtoken:'',agents:['','',''],openPrereqs:{}};

function render(){
  document.getElementById('app').innerHTML=V[S.v]();
  document.querySelector('header').style.display=S.v==='s0'?'none':'';
  document.querySelector('footer').style.display=S.v==='s0'?'none':'';
  window.scrollTo({top:0,behavior:'smooth'});
  updateGoButton();
}
function goHome(){S.v='s0';history.pushState(null,'','/');render()}

function togglePrereq(id){
  S.openPrereqs[id]=!S.openPrereqs[id];
  const body=document.getElementById('body-'+id);
  if(body)body.classList.toggle('open',S.openPrereqs[id]);
}

function updateGoButton(){
  const btn=document.getElementById('go-btn');
  if(!btn)return;
  const filled=checkAllFilled();
  btn.disabled=!filled;
  btn.textContent=filled?'Set up my bot':'Fill in all fields above to continue';
}

function checkAllFilled(){
  const b=S.brave.length>=15;
  const t=S.tgtoken.length>=30&&S.tgtoken.includes(':');
  const c=S.claude.length>=20;
  if(S.path==='cloud'){
    const h=S.hkey.length>=10;
    return b&&t&&h&&c;
  }
  return b&&t&&c;
}

function saveField(field,inputId){
  const el=document.getElementById(inputId);
  if(el)S[field]=el.value.trim();
  // Update check marks
  updateChecks();
  updateGoButton();
}

function updateChecks(){
  setCheck('check-brave',S.brave.length>=15);
  setCheck('check-telegram',S.tgtoken.length>=30&&S.tgtoken.includes(':'));
  if(S.path==='cloud')setCheck('check-hostinger',S.hkey.length>=10);
  setCheck('check-claude',S.claude.length>=20);
}

function setCheck(id,done){
  const el=document.getElementById(id);
  if(!el)return;
  const card=el.closest('.prereq');
  if(done){
    el.innerHTML='✓';
    if(card)card.classList.add('done');
  }else{
    el.innerHTML='';
    if(card)card.classList.remove('done');
  }
}

const V={

s0:()=>`
<div class="cover">
<div class="cover-brand"><img src="https://usemyclaw.com/logo-64.png" alt="" style="height:32px;width:32px;vertical-align:middle;margin-right:10px;opacity:0.7">BotSetupGuide.com</div>
<p class="cover-tagline">Set up your own <a href="https://openclaw.ai" target="_blank">OpenClaw</a> AI bot</p>
<p class="cover-time">Takes about 15-20 minutes. No coding required.</p>
<button class="cover-start" onclick="S.v='s1';render()">Let's go</button>
<p class="existing-link" style="margin-top:12px">
  <strong style="color:#F2F2F2;font-weight:400">Already have OpenClaw?</strong> 
  <a href="https://usemyclaw.com/install.sh" target="_blank">Run the one-liner →</a>
</p>
<p class="existing-link" style="margin-top:20px">Already have a bot? <a href="/upgrade" onclick="goUpgrade();return false">Add browser &amp; mobile access →</a></p>
</div>
<div class="cover-powered">
  <a class="footer-brand" href="https://humanitylabs.org" target="_blank">
    <span>powered by</span>
    <img src="/humanity-labs-logo.png" alt="Humanity Labs">
  </a>
</div>
`,

s1:()=>`
<h1>Where will your bot live?</h1>
<p class="subtitle">Your bot needs a computer that stays on 24/7. Pick one:</p>

<div class="pick">
<div class="pick-card${S.path==='cloud'?' on':''}" onclick="S.path='cloud';render()">
<div class="icon">☁️</div>
<div class="title">Rent a cloud server</div>
<div class="desc">We'll set up a virtual computer for you on Hostinger. About $11/mo.</div>
</div>
<div class="pick-card${S.path==='local'?' on':''}" onclick="S.path='local';render()">
<div class="icon">🖥</div>
<div class="title">Use my own computer</div>
<div class="desc">A Mac mini, old laptop, or spare machine that can stay on.</div>
</div>
</div>

<button onclick="s1n()" ${!S.path?'disabled':''}>Next</button>
`,

s2:()=>`
<h1>Gather your ingredients</h1>
<p class="subtitle">You need ${S.path==='cloud'?'4':'3'} things before we can set up your bot. Get each one, paste it below, and you'll see a green checkmark. Once they're all green, press the button at the bottom.</p>

<div class="reassure reassure-calm">
  🧑‍🍳 Think of this like a recipe. We're just gathering ingredients first, then we cook. None of these steps change anything on your computer.
</div>

<!-- 1. BRAVE SEARCH -->
<div class="prereq" id="card-brave">
<div class="prereq-header" onclick="togglePrereq('brave')">
  <div class="prereq-left">
    <div class="prereq-icon">🔍</div>
    <div class="prereq-info">
      <div class="prereq-title">Brave Search API key</div>
      <div class="prereq-meta">
        <span class="badge badge-easy">Easy</span>
        <span class="badge badge-free">Free</span>
        <span class="time-est">~2 min</span>
      </div>
    </div>
  </div>
  <div class="prereq-check" id="check-brave"></div>
</div>
<div class="prereq-body${S.openPrereqs.brave?' open':''}" id="body-brave">
  <p>This lets your bot search the internet. Completely free, no credit card.</p>
  <ol>
    <li>Go to <a href="https://brave.com/search/api" target="_blank"><strong>brave.com/search/api</strong></a></li>
    <li>Click <strong>"Get started for free"</strong> and create an account</li>
    <li>On the dashboard, you'll see your API key. Copy it.</li>
  </ol>
  <input type="password" id="in-brave" placeholder="Paste your Brave Search API key" value="${esc(S.brave)}" oninput="saveField('brave','in-brave')" autocomplete="off">
  <div class="example">Looks like: BSAQx9p5B-69...about 30 characters</div>
</div>
</div>

<!-- 2. TELEGRAM BOT -->
<div class="prereq" id="card-telegram">
<div class="prereq-header" onclick="togglePrereq('telegram')">
  <div class="prereq-left">
    <div class="prereq-icon">💬</div>

// --- Scripts ---

function localScript(){
  return`curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard && \\
openclaw onboard --non-interactive \\
  --mode local \\
  --auth-choice setup-token \\
  --token "${S.claude}" \\
  --token-provider anthropic \\
  --gateway-port 18789 \\
  --gateway-bind loopback \\
  --accept-risk \\
  --install-daemon \\
  --daemon-runtime node \\
  --skip-skills \\
  --skip-channels \\
  --skip-ui && \\
openclaw config set tools.web.search.apiKey "${S.brave}" && \\
openclaw config set channels.telegram.botToken "${S.tgtoken}" && \\
openclaw gateway restart`;
}

function serverScript(){
  return`#!/bin/bash
set -e
export DEBIAN_FRONTEND=noninteractive
curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
apt-get install -y nodejs
curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
openclaw onboard --non-interactive \\
  --mode local \\
  --auth-choice setup-token \\
  --token "${S.claude}" \\
  --token-provider anthropic \\
  --gateway-port 18789 \\
  --gateway-bind loopback \\
  --accept-risk \\
  --install-daemon \\
  --daemon-runtime node \\
  --skip-skills \\
  --skip-channels \\
  --skip-ui
openclaw config set tools.web.search.apiKey "${S.brave}"
openclaw config set channels.telegram.botToken "${S.tgtoken}"
openclaw gateway restart`;
}

// --- Hostinger server creation ---

async function api(m,p,b){
  const r=await fetch('/api/hostinger',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({apiKey:S.hkey,method:m,path:p,body:b})
  });
  return r.json();
}

function showError(title,desc){
  const sw=document.getElementById('spinwrap');if(sw)sw.style.display='none';
  const stEl=document.getElementById('stxt');if(stEl)stEl.style.display='none';
  const eb=document.getElementById('ebox');if(eb)eb.classList.add('show');
  const et=document.getElementById('etitle');if(et)et.textContent=title;
  const ed=document.getElementById('edesc');if(ed)ed.innerHTML=desc;
}

function retryOrBack(){
  const eb=document.getElementById('ebox');if(eb)eb.classList.remove('show');
  const sw=document.getElementById('spinwrap');if(sw)sw.style.display='';
  const stEl=document.getElementById('stxt');if(stEl){stEl.style.display='';stEl.textContent='Retrying...'}
  createServer();
}

async function createServer(){
  try{
    st('Uploading setup script to Hostinger...');
    let s;
    try{
      s=await api('POST','/api/vps/v1/post-install-scripts',{name:'OC-'+Date.now(),content:serverScript()});
    }catch(e){
      showError('Could not connect to Hostinger','Check your internet connection and try again.');return;
    }
    if(!s.id){
      if(s.message&&(s.message.includes('auth')||s.message.includes('token')||s.message.includes('401')||s.message.includes('403'))){
        showError('Your Hostinger API key is invalid','The key you entered was not accepted by Hostinger. Go to your <a href="https://hpanel.hostinger.com/account/api" target="_blank">Hostinger dashboard, then Account, then API</a>, create a new token, and go back to paste the new one.');
      }else{
        showError('Hostinger rejected the request',`Error: "${s.message||'Unknown error'}". Double-check your API key at <a href="https://hpanel.hostinger.com/account/api" target="_blank">Hostinger, then Account, then API</a>.`);
      }
      return;
    }
    st('Creating your server (this takes 1-2 minutes)...');
    let vm;
    try{
      vm=await api('POST','/api/vps/v1/virtual-machines',{plan:'hostingercom-vps-kvm2-usd-1m',template_id:1002,hostname:'openclaw-ai',post_install_script_id:s.id});
    }catch(e){
      showError('Could not create server','The connection to Hostinger was lost. Check your internet and try again.');return;
    }
    const id=vm.id||vm.virtual_machine_id;
    if(!id){
      if(vm.message&&(vm.message.includes('payment')||vm.message.includes('billing')||vm.message.includes('balance'))){
        showError('Payment issue on Hostinger','Hostinger needs a valid payment method before it can create a server. Go to <a href="https://hpanel.hostinger.com" target="_blank">hpanel.hostinger.com</a>, make sure you have a credit card on file, then come back and try again.');
      }else if(vm.message&&vm.message.includes('limit')){
        showError('Server limit reached','Your Hostinger account has reached its server limit. You may need to upgrade your plan or delete an old server at <a href="https://hpanel.hostinger.com" target="_blank">hpanel.hostinger.com</a>.');
      }else{
        showError('Could not create the server',`Hostinger said: "${vm.message||'Unknown error'}". Try again, or check your <a href="https://hpanel.hostinger.com" target="_blank">Hostinger dashboard</a>.`);
      }
      return;
    }
    st('Server created! Waiting for it to come online...');
    for(let i=0;i<60;i++){
      await slp(5000);
      try{
        const r=await api('GET',`/api/vps/v1/virtual-machines/${id}`);
        if((r.state||r.status)==='running'){
          S.v='done';render();return;
        }
        st(`Still setting up... ${Math.floor(i*5/60)}m ${(i*5)%60}s`);
      }catch{}
    }
    showError('Server is taking too long','Your server was created but hasn\'t come online after 5 minutes. Check your <a href="https://hpanel.hostinger.com" target="_blank">Hostinger dashboard</a> to see its status.');
  }catch(e){
    showError('Something unexpected happened',`Error: "${e.message}". Try again, or <a href="https://hpanel.hostinger.com" target="_blank">check your Hostinger dashboard</a>.`);
  }
}

// --- Utilities ---

function st(h){const el=document.getElementById('stxt');if(el)el.innerHTML=h}
function slp(ms){return new Promise(r=>setTimeout(r,ms))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cp(el){const t=el.textContent.replace('click to copy','').trim();navigator.clipboard.writeText(t);const o=el.style.opacity;el.style.opacity='.5';setTimeout(()=>el.style.opacity=o,300)}
function cpMsg(btn){const body=btn.closest('.msg-box').querySelector('.msg-box-body');navigator.clipboard.writeText(body.innerText.trim());const o=btn.textContent;btn.textContent='\u2713 Copied!';setTimeout(()=>btn.textContent=o,2000)}

document.addEventListener('paste',e=>{
  if(e.target.tagName==='INPUT'){
    e.preventDefault();
    const t=(e.clipboardData||window.clipboardData).getData('text').replace(/[\r\n]+/g,'').trim();
    e.target.value=t;
    e.target.dispatchEvent(new Event('input'));
  }
});

// URL routing
function goUpgrade(){S.v='upgrade1';history.pushState(null,'','/upgrade');render()}
function route(){
  const p=window.location.pathname;
  if(p==='/upgrade'||p==='/upgrade/'){S.v='upgrade1';render();return true}
  return false;
}
window.addEventListener('popstate',()=>{if(!route()){S.v='s0';render()}});
if(!route())render();
</script>
