<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Setup Guide</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='70' font-size='70'>🤖</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Georgia,serif;background:#fff;color:#222;font-size:19px;line-height:1.9;-webkit-font-smoothing:antialiased}
    .w{max-width:460px;margin:0 auto;padding:80px 24px 60px}
    h1{font-size:28px;font-weight:400;line-height:1.4;margin-bottom:6px}
    .sub{color:#999;font-size:16px;margin-bottom:56px}
    p{margin-bottom:20px}
    a{color:#222}
    ol{margin:0 0 28px 28px}
    ol li{margin-bottom:4px}
    code{font-family:Menlo,monospace;font-size:15px}
    input,select{display:block;width:100%;padding:14px;font-size:16px;font-family:Menlo,monospace;border:1px solid #ddd;border-radius:4px;background:#fff;color:#222;margin:8px 0 28px}
    input:focus,select:focus{outline:none;border-color:#aaa}
    input::placeholder{color:#ccc}
    .pick{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0 0 28px}
    .pick-card{padding:24px 16px;text-align:center;cursor:pointer;border:1px solid #ddd;border-radius:4px}
    .pick-card:hover{border-color:#aaa}
    .pick-card.on{border-color:#222}
    .pick .i{font-size:28px;margin-bottom:8px}
    .pick .t{font-size:16px;font-family:-apple-system,system-ui,sans-serif}
    .pick .d{font-size:13px;color:#999;margin-top:2px;font-family:-apple-system,system-ui,sans-serif}
    .cmd{font-family:Menlo,monospace;font-size:13px;background:#f7f7f7;border-radius:4px;padding:14px;margin:12px 0 20px;white-space:pre-wrap;word-break:break-all;line-height:1.6;cursor:pointer;color:#333}
    .cmd:hover{background:#f0f0f0}
    button{display:block;width:100%;padding:16px;font-size:16px;font-weight:600;font-family:-apple-system,system-ui,sans-serif;background:#222;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:40px}
    button:hover{background:#444}
    .back{font-size:14px;color:#ccc;margin-top:12px;cursor:pointer;text-decoration:none;display:inline-block;font-family:-apple-system,system-ui,sans-serif}
    .back:hover{color:#999}
    .spinner{width:24px;height:24px;border:2px solid #ddd;border-top-color:#222;border-radius:50%;animation:s .7s linear infinite;margin:60px auto 16px}
    @keyframes s{to{transform:rotate(360deg)}}
    .st{text-align:center;color:#999;font-size:16px}
    hr{border:none;border-top:1px solid #eee;margin:36px 0}
    .extra{display:none}.extra.show{display:block}
    footer{text-align:center;color:#ccc;font-size:12px;padding:0 24px 40px;font-family:-apple-system,system-ui,sans-serif}
    footer a{color:#ccc;text-decoration:none}
    @media(max-width:480px){.pick{grid-template-columns:1fr}h1{font-size:24px}}
  </style>
</head>
<body>
<div class="w" id="app"></div>
<footer><a href="https://www.botsetupguide.com">botsetupguide.com</a> · by <a href="https://humanitylabs.org">humanitylabs.org</a></footer>
<script>
const S={v:'s1',path:null,claude:'',brave:'',hkey:'',region:''};
function render(){document.getElementById('app').innerHTML=V[S.v]();window.scrollTo({top:0,behavior:'smooth'})}

const V={
s1:()=>`
<h1>Set up your AI assistant</h1>
<p class="sub">Takes about 10 minutes.</p>

<p><a href="https://claude.ai/upgrade" target="_blank">Subscribe to Claude</a> ($200/mo Max plan recommended), then get your token:</p>
<ol>
<li>Install <a href="https://claude.ai/download" target="_blank">Claude Code</a></li>
<li>Run <code>claude setup-token</code> in Terminal</li>
<li>Copy the token</li>
</ol>
<input type="password" id="in1" placeholder="Paste your Claude token" autocomplete="off">

<p>Get a <a href="https://brave.com/search/api" target="_blank">Brave Search</a> key (free) so your AI can search the web.</p>
<input type="password" id="in2" placeholder="Paste your Brave key" autocomplete="off">

<button onclick="s1()">Next</button>
`,

s2:()=>`
<h1>Where should it run?</h1>
<p class="sub">Pick one.</p>
<div class="pick">
<div class="pick-card${S.path==='cloud'?' on':''}" onclick="pk('cloud',this)"><div class="i">☁️</div><div class="t">Cloud</div><div class="d">~$5/mo, always on</div></div>
<div class="pick-card${S.path==='local'?' on':''}" onclick="pk('local',this)"><div class="i">💻</div><div class="t">My computer</div><div class="d">Free</div></div>
</div>
<div class="extra${S.path==='cloud'?' show':''}" id="ce">
<p>Sign up at <a href="https://www.hostinger.com/vps-hosting?REFERRALCODE=XLSMIGUELN7E" target="_blank">Hostinger</a>, then go to Account → API and create a key.</p>
<input type="password" id="in3" placeholder="Paste your Hostinger key" autocomplete="off">
<p>Server location</p>
<select id="in4"><option value="2">North America</option><option value="13">Europe</option><option value="22">Asia</option><option value="5">UK</option><option value="8">South America</option></select>
</div>
<button onclick="s2()">Set up my AI</button>
<a class="back" onclick="S.v='s1';render()">← Back</a>
`,

creating:()=>`
<h1>Creating your server</h1>
<p class="sub">This takes a few minutes.</p>
<div class="spinner"></div>
<p class="st" id="stxt">Setting up...</p>
`,

local:()=>`
<h1>Paste this in Terminal</h1>
<p class="sub">One command. It does everything.</p>
<div class="cmd" onclick="cp(this)">${esc(lscript())}</div>
<button onclick="S.v='connect';render()">Done</button>
<a class="back" onclick="S.v='s2';render()">← Back</a>
`,

connect:()=>`
<h1>Connect</h1>
<p class="sub">Your AI is running. Pick how to talk to it.</p>

<p><strong>Telegram</strong></p>
<ol>
<li>Message <a href="https://t.me/botfather" target="_blank">@BotFather</a>, send /newbot</li>
<li>Copy the token, then run:</li>
</ol>
<div class="cmd" onclick="cp(this)">openclaw channels add --channel telegram --token YOUR_BOT_TOKEN && openclaw gateway restart</div>

<hr>

<p><strong>Obsidian</strong></p>
<ol>
<li>Install <a href="https://obsidian.md" target="_blank">Obsidian</a> and the BRAT plugin</li>
<li>BRAT → Add Beta Plugin:</li>
</ol>
<div class="cmd" onclick="cp(this)">oscarhenrycollins/obsidianclaw</div>

<hr>

<p><strong>Browser</strong></p>
<p>Open your Tailscale URL in any browser.</p>

<hr>

<p style="text-align:center;color:#999;margin-top:40px">You're set. Your AI is running 24/7.</p>

<a class="back" onclick="S.v='s1';render()">← Start over</a>
`
};

function pk(p,el){S.path=p;document.querySelectorAll('.pick-card').forEach(c=>c.classList.remove('on'));el.classList.add('on');const e=document.getElementById('ce');if(e)e.classList.toggle('show',p==='cloud')}
function s1(){S.claude=document.getElementById('in1').value.trim();S.brave=document.getElementById('in2').value.trim();if(!S.claude)return alert('Paste your Claude token.');if(!S.brave)return alert('Paste your Brave key.');S.v='s2';render()}
function s2(){if(!S.path)return alert('Pick cloud or local.');if(S.path==='local'){S.v='local';render();return}S.hkey=document.getElementById('in3').value.trim();S.region=document.getElementById('in4').value;if(!S.hkey)return alert('Paste your Hostinger key.');S.v='creating';render();createServer()}

function lscript(){return`curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard && \\
openclaw config set tools.web.search.apiKey "${S.brave}" && \\
openclaw config set gateway.bind loopback && \\
openclaw config set gateway.tailscale.mode serve && \\
openclaw config set gateway.auth.mode token && \\
openclaw config set gateway.auth.allowTailscale true && \\
echo "${S.claude}" | openclaw models auth paste-token --provider anthropic --yes && \\
curl -fsSL https://tailscale.com/install.sh | sh && \\
sudo tailscale up && \\
openclaw gateway start`}

function sscript(){return`#!/bin/bash
set -e
export DEBIAN_FRONTEND=noninteractive
curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
apt-get install -y nodejs
curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
openclaw config set tools.web.search.apiKey "${S.brave}"
openclaw config set gateway.bind loopback
openclaw config set gateway.tailscale.mode serve
openclaw config set gateway.auth.mode token
openclaw config set gateway.auth.allowTailscale true
echo "${S.claude}" | openclaw models auth paste-token --provider anthropic --yes
curl -fsSL https://tailscale.com/install.sh | sh
openclaw gateway start`}

async function api(m,p,b){const r=await fetch('/api/hostinger',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:S.hkey,method:m,path:p,body:b})});return r.json()}
async function createServer(){try{st('Uploading script...');const s=await api('POST','/api/vps/v1/post-install-scripts',{name:'OC-'+Date.now(),content:sscript()});if(!s.id)throw new Error(s.message||'Upload failed');st('Creating server...');const vm=await api('POST','/api/vps/v1/virtual-machines',{plan:'hostingercom-vps-kvm2-usd-1m',data_center_id:parseInt(S.region),template_id:1002,hostname:'openclaw-ai',post_install_script_id:s.id});const id=vm.id||vm.virtual_machine_id;if(!id)throw new Error(vm.message||'Creation failed');st('Installing...');for(let i=0;i<60;i++){await slp(5000);try{const r=await api('GET',`/api/vps/v1/virtual-machines/${id}`);if((r.state||r.status)==='running'){S.v='connect';render();return}}catch{}st(`Installing... ${i*5}s`)}st('Check <a href="https://hpanel.hostinger.com" target="_blank">Hostinger dashboard</a>.')}catch(e){st(e.message)}}
function st(h){const el=document.getElementById('stxt');if(el)el.innerHTML=h}
function slp(ms){return new Promise(r=>setTimeout(r,ms))}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cp(el){const t=el.textContent;navigator.clipboard.writeText(t);const o=el.style.background;el.style.background='#e8e8e8';setTimeout(()=>el.style.background=o,300)}

render();
</script>
</body>
</html>
