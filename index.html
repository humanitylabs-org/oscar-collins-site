<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up your AI assistant — Bot Setup Guide</title>
  <meta name="description" content="Get your own 24/7 AI assistant. No technical experience needed.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='70' font-size='70'>🤖</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,system-ui,sans-serif;background:#0a0a0a;color:#e0e0e0;line-height:1.6;font-size:17px;min-height:100vh}
    a{color:#6db3f2;text-decoration:none}a:hover{text-decoration:underline}

    .container{max-width:560px;margin:0 auto;padding:40px 20px}

    header{text-align:center;margin-bottom:40px}
    header h1{font-size:28px;font-weight:700;color:#fff;margin-bottom:6px}
    header p{font-size:16px;color:#888}

    .card{background:#141414;border:1px solid #222;border-radius:16px;padding:32px;margin-bottom:20px}

    h2{font-size:22px;font-weight:600;color:#fff;margin-bottom:20px}
    .card p{color:#aaa;margin-bottom:12px;font-size:15px}

    .section{margin-bottom:28px}
    .section-label{font-size:13px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}

    .field{margin-bottom:16px}
    .field label{display:block;font-weight:600;color:#ddd;margin-bottom:6px;font-size:14px}
    .field input{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;font-family:inherit}
    .field input:focus{outline:none;border-color:#6db3f2}
    .field input::placeholder{color:#555}
    .field .hint{font-size:13px;color:#555;margin-top:6px}
    .field .hint a{color:#6db3f2}

    .link-btn{display:inline-flex;align-items:center;gap:8px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:10px 16px;color:#6db3f2;font-weight:500;font-size:13px;text-decoration:none;transition:all 0.2s;margin-bottom:10px}
    .link-btn:hover{border-color:#6db3f2;text-decoration:none;background:#1e2530}

    .pick{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pick-card{background:#1a1a1a;border:2px solid #2a2a2a;border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:all 0.2s}
    .pick-card:hover{border-color:#444}
    .pick-card.selected{border-color:#6db3f2;background:#1e2530}
    .pick-card svg{width:56px;height:56px;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}
    .pick-card h3{font-size:15px;font-weight:600;color:#fff;margin-bottom:2px}
    .pick-card p{font-size:12px;color:#888;margin:0}

    .cloud-fields{margin-top:20px;padding-top:20px;border-top:1px solid #222}

    .cmd{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;margin:14px 0;position:relative;font-family:'SF Mono',Consolas,monospace;font-size:13px;color:#a5d6ff;white-space:pre-wrap;word-break:break-all;line-height:1.5;cursor:pointer;transition:border-color 0.2s}
    .cmd:hover{border-color:#444}
    .cmd:active{border-color:#6db3f2}
    .cmd::after{content:'Copy';position:absolute;top:10px;right:12px;font-size:11px;color:#666;font-family:-apple-system,system-ui,sans-serif;pointer-events:none}
    .cmd.copied::after{content:'Copied ✓';color:#6db3f2}

    .btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;width:100%}
    .btn-primary{background:linear-gradient(135deg,#6db3f2,#a78bfa);color:#fff}
    .btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.3;cursor:not-allowed;transform:none}
    .btn-back{background:transparent;color:#888;padding:13px 16px;width:auto}
    .btn-back:hover{color:#fff}

    .status-box{text-align:center;padding:40px 20px}
    .spinner{width:48px;height:48px;border:3px solid #333;border-top-color:#6db3f2;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status-text{color:#aaa;font-size:15px}
    .status-text strong{color:#fff}

    .connect-opt{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-top:12px}
    .connect-opt h3{font-size:16px;color:#fff;margin-bottom:8px}
    .connect-opt p{font-size:14px;color:#888;margin:0}
    .connect-opt ol{margin:12px 0 0 20px;font-size:14px;color:#aaa;line-height:2}

    .done-box{text-align:center;padding:32px;background:linear-gradient(135deg,rgba(109,179,242,0.1),rgba(167,139,250,0.1));border:1px solid rgba(109,179,242,0.2);border-radius:16px;margin-top:24px}
    .done-box h3{font-size:24px;color:#fff;margin-bottom:8px}
    .done-box p{color:#888;font-size:14px}

    .hidden{display:none!important}

    .plan-pills{display:flex;gap:6px;margin:8px 0 4px}
    .pill{font-size:12px;padding:4px 10px;border-radius:6px;background:#1a1a1a;border:1px solid #2a2a2a;color:#888}
    .pill.rec{border-color:#6db3f2;color:#6db3f2;background:#1e2530}

    .step-token{background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin:12px 0}
    .step-token p{font-size:14px;color:#aaa;margin-bottom:8px}
    .step-token .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#6db3f2;color:#0a0a0a;border-radius:50%;font-size:12px;font-weight:700;margin-right:6px}

    footer{text-align:center;padding:40px 20px;color:#555;font-size:13px}
    footer a{color:#555}

    @media(max-width:480px){
      .pick{grid-template-columns:1fr}
      header h1{font-size:24px}
      .card{padding:24px}
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Set up your AI assistant</h1>
    <p>Your own 24/7 AI. One form, then we do the rest.</p>
  </header>

  <div id="app"></div>
</div>

<footer>
  <a href="https://humanitylabs.org">Humanity Labs</a> · <a href="https://openclaw.ai">OpenClaw</a> · <a href="https://discord.com/invite/clawd">Discord</a>
</footer>

<script>
const S = { view:'form', path:null, claudeToken:'', braveKey:'', hostingerKey:'', region:'' };

const cloudSvg = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 38c-4.4 0-8-3.6-8-8 0-3.7 2.5-6.8 6-7.7C13.5 16.4 18.3 12 24 12c5 0 9.2 2.8 11.3 6.9C36.1 18.3 37 18 38 18c4.4 0 8 3.6 8 8 0 .7-.1 1.3-.3 2 3.1 1.2 5.3 4.2 5.3 7.7 0 4.5-3.4 8.3-8 8.3H14z" fill="#1e2530" stroke="#6db3f2" stroke-width="1.5"/></svg>`;
const localSvg = `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="12" width="40" height="26" rx="3" fill="#1e2530" stroke="#a78bfa" stroke-width="1.5"/><rect x="12" y="16" width="32" height="18" rx="1.5" fill="#0a0a0a"/><path d="M22 42h12v2a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 0122 44v-2z" fill="#1e2530" stroke="#a78bfa" stroke-width="1.5"/></svg>`;

function render() {
  const app = document.getElementById('app');
  if (S.view === 'form') app.innerHTML = renderForm();
  else if (S.view === 'creating') app.innerHTML = renderCreating();
  else if (S.view === 'local') app.innerHTML = renderLocal();
  else if (S.view === 'connect') app.innerHTML = renderConnect();
}

function renderForm() {
  return `
    <div class="card">
      <h2>Your details</h2>

      <div class="section">
        <div class="section-label">AI Brain</div>

        <a href="https://claude.ai/upgrade" target="_blank" class="link-btn">Subscribe to Claude →</a>
        <div class="plan-pills">
          <span class="pill">$20 Pro</span>
          <span class="pill">$100 Max 5x</span>
          <span class="pill rec">$200 Max 20x ★</span>
        </div>

        <div class="step-token">
          <p><span class="num">1</span>Install <a href="https://claude.ai/download" target="_blank">Claude Code</a> on your computer</p>
          <p><span class="num">2</span>Open Terminal and run: <code style="color:#a5d6ff">claude setup-token</code></p>
          <p><span class="num">3</span>Copy the token and paste it below</p>
        </div>

        <div class="field">
          <label>Claude Setup Token</label>
          <input type="password" id="claudeInput" placeholder="Paste your setup token" autocomplete="off">
        </div>
      </div>

      <div class="section">
        <div class="section-label">Web Search</div>
        <a href="https://brave.com/search/api" target="_blank" class="link-btn">Get Brave Search key (free) →</a>
        <div class="field">
          <label>Brave Search API Key</label>
          <input type="password" id="braveInput" placeholder="Paste your Brave API key" autocomplete="off">
        </div>
      </div>

      <div class="section" style="margin-bottom:0">
        <div class="section-label">Where to install</div>
        <div class="pick">
          <div class="pick-card ${S.path==='cloud'?'selected':''}" onclick="pickPath('cloud',this)">
            ${cloudSvg}
            <h3>Cloud Server</h3>
            <p>~$2/mo · Always on</p>
          </div>
          <div class="pick-card ${S.path==='local'?'selected':''}" onclick="pickPath('local',this)">
            ${localSvg}
            <h3>My Computer</h3>
            <p>Free · Mac / Linux / Pi</p>
          </div>
        </div>

        <div id="cloudFields" class="${S.path==='cloud'?'cloud-fields':'cloud-fields hidden'}">
          <a href="https://www.hostinger.com/vps-hosting?REFERRALCODE=XLSMIGUELN7E" target="_blank" class="link-btn">Sign up for Hostinger →</a>
          <p style="font-size:13px;color:#666;margin-bottom:12px">Get the cheapest VPS plan (KVM 1). Add a payment method. Then go to <strong style="color:#aaa">Account → API</strong> to create a key.</p>
          <div class="field">
            <label>Hostinger API Key</label>
            <input type="password" id="hostingerInput" placeholder="Paste your Hostinger API key" autocomplete="off">
          </div>
          <div class="field">
            <label>Server Location</label>
            <select id="regionSelect" style="width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;font-family:inherit">
              <option value="2">🇺🇸 North America</option>
              <option value="13">🇪🇺 Europe</option>
              <option value="22">🇸🇬 Asia</option>
              <option value="5">🇬🇧 United Kingdom</option>
              <option value="8">🇧🇷 South America</option>
            </select>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" style="margin-top:28px" onclick="submit()">Set Up My AI →</button>
    </div>
  `;
}

function renderCreating() {
  return `
    <div class="card">
      <div class="status-box">
        <div class="spinner"></div>
        <p class="status-text" id="statusText"><strong>Creating your server...</strong><br>This takes 2-5 minutes. Don't close this page.</p>
      </div>
    </div>
  `;
}

function renderLocal() {
  return `
    <div class="card">
      <h2>Run this in Terminal</h2>
      <p>Open <strong style="color:#fff">Terminal</strong> on your computer and paste this command. It installs and configures everything.</p>

      <div class="cmd" onclick="copyEl(this)">${escHtml(buildLocalScript())}</div>

      <p style="font-size:13px;color:#555">The command will pause once to accept your Claude token. Just follow the prompt.</p>

      <button class="btn btn-primary" style="margin-top:20px" onclick="S.view='connect';render();scroll()">I'm done, it's running →</button>
      <button class="btn btn-back" onclick="S.view='form';render();scroll()">← Back</button>
    </div>
  `;
}

function renderConnect() {
  return `
    <div class="card">
      <h2>Talk to your AI</h2>

      <div class="connect-opt">
        <h3>💬 Telegram</h3>
        <ol>
          <li>Message <a href="https://t.me/botfather" target="_blank">@BotFather</a> → send <code>/newbot</code></li>
          <li>Copy the token, then run:</li>
        </ol>
        <div class="cmd" onclick="copyEl(this)">openclaw channels add --channel telegram --token YOUR_BOT_TOKEN && openclaw gateway restart</div>
      </div>

      <div class="connect-opt">
        <h3>📝 Obsidian</h3>
        <ol>
          <li>Install <a href="https://obsidian.md" target="_blank">Obsidian</a> + BRAT plugin</li>
          <li>BRAT → Add Beta Plugin:</li>
        </ol>
        <div class="cmd" onclick="copyEl(this)">oscarhenrycollins/obsidianclaw</div>
        <p style="margin-top:8px">Paste your Tailscale URL and token in the setup wizard.</p>
      </div>

      <div class="connect-opt">
        <h3>🌐 Browser</h3>
        <p>Open your Tailscale URL in any browser.</p>
      </div>

      <div class="done-box">
        <h3>🎉 You're set!</h3>
        <p>Your AI is running 24/7.<br>Questions? <a href="https://discord.com/invite/clawd" style="color:#6db3f2">Join Discord</a></p>
      </div>

      <button class="btn btn-back" style="margin-top:16px" onclick="S.view='form';render();scroll()">← Back</button>
    </div>
  `;
}

// -- Logic --

function pickPath(p, el) {
  S.path = p;
  const cf = document.getElementById('cloudFields');
  if (cf) cf.classList.toggle('hidden', p !== 'cloud');
  document.querySelectorAll('.pick-card').forEach(c => c.classList.remove('selected'));
  if (el) el.classList.add('selected');
}

function submit() {
  S.claudeToken = document.getElementById('claudeInput').value.trim();
  S.braveKey = document.getElementById('braveInput').value.trim();

  if (!S.claudeToken) return alert('Please paste your Claude setup token.');
  if (!S.braveKey) return alert('Please paste your Brave Search API key.');
  if (!S.path) return alert('Please choose where to install (Cloud or My Computer).');

  if (S.path === 'cloud') {
    S.hostingerKey = document.getElementById('hostingerInput').value.trim();
    S.region = document.getElementById('regionSelect').value;
    if (!S.hostingerKey) return alert('Please paste your Hostinger API key.');
    S.view = 'creating';
    render();
    createServer();
  } else {
    S.view = 'local';
    render();
    scroll();
  }
}

function buildLocalScript() {
  return `curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard && \\
openclaw config set tools.web.search.apiKey "${S.braveKey}" && \\
openclaw config set gateway.bind loopback && \\
openclaw config set gateway.tailscale.mode serve && \\
openclaw config set gateway.auth.mode token && \\
openclaw config set gateway.auth.allowTailscale true && \\
echo "${S.claudeToken}" | openclaw models auth paste-token --provider anthropic --yes && \\
curl -fsSL https://tailscale.com/install.sh | sh && \\
sudo tailscale up && \\
openclaw gateway start`;
}

function buildServerScript() {
  return `#!/bin/bash
set -e
export DEBIAN_FRONTEND=noninteractive

# Install Node.js 22
curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
apt-get install -y nodejs

# Install OpenClaw (skip onboarding)
curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard

# Configure gateway
openclaw config set tools.web.search.apiKey "${S.braveKey}"
openclaw config set gateway.bind loopback
openclaw config set gateway.tailscale.mode serve
openclaw config set gateway.auth.mode token
openclaw config set gateway.auth.allowTailscale true

# Set Claude auth
echo "${S.claudeToken}" | openclaw models auth paste-token --provider anthropic --yes

# Install & start Tailscale
curl -fsSL https://tailscale.com/install.sh | sh
tailscale up --authkey=\${TAILSCALE_AUTHKEY:-}

# Start OpenClaw gateway
openclaw gateway start
`;
}

// -- Hostinger API --

async function hostingerApi(method, path, body) {
  const res = await fetch('/api/hostinger', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey: S.hostingerKey, method, path, body })
  });
  return res.json();
}

async function createServer() {
  try {
    updateStatus('Uploading setup script...');

    const scriptRes = await hostingerApi('POST', '/api/vps/v1/post-install-scripts', {
      name: 'OpenClaw Setup ' + Date.now(),
      content: buildServerScript()
    });

    if (!scriptRes.id) throw new Error(scriptRes.message || 'Failed to upload script');

    updateStatus('Creating your server...');

    const vmRes = await hostingerApi('POST', '/api/vps/v1/virtual-machines', {
      plan: 'hostingercom-vps-kvm1-usd-1m',
      data_center_id: parseInt(S.region),
      template_id: 1002,
      hostname: 'openclaw-ai',
      post_install_script_id: scriptRes.id
    });

    if (!vmRes.id && !vmRes.virtual_machine_id) throw new Error(vmRes.message || 'Failed to create server');

    const vmId = vmRes.id || vmRes.virtual_machine_id;
    updateStatus('Server created! Installing everything...<br>This takes 2-5 minutes.');

    let attempts = 0;
    while (attempts < 60) {
      await sleep(5000);
      attempts++;
      try {
        const status = await hostingerApi('GET', `/api/vps/v1/virtual-machines/${vmId}`);
        const ip = status.ipv4?.[0]?.address || status.ip || status.ipv4_address || '';
        const state = status.state || status.status || '';

        if (state === 'running') {
          updateStatus(`<strong>Server is ready!</strong><br>IP: ${ip || 'Check Hostinger dashboard'}<br><br>Tailscale still needs to be joined. SSH in and run:<br><code style="color:#a5d6ff">sudo tailscale up</code>`);
          await sleep(3000);
          S.view = 'connect';
          render();
          scroll();
          return;
        }
        updateStatus(`Setting up... (${Math.floor(attempts * 5 / 60)}m ${(attempts * 5) % 60}s)<br>Don't close this page.`);
      } catch { /* keep polling */ }
    }

    updateStatus('Taking longer than expected.<br><a href="https://hpanel.hostinger.com" target="_blank" style="color:#6db3f2">Check Hostinger dashboard</a>');

  } catch (err) {
    updateStatus(`<strong>Something went wrong</strong><br>${err.message}<br><br><button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="S.view='form';render()">← Try Again</button>`);
  }
}

function updateStatus(html) {
  const el = document.getElementById('statusText');
  if (el) el.innerHTML = html;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function scroll() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copyEl(el) {
  navigator.clipboard.writeText(el.textContent);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 2000);
}

render();
</script>

</body>
</html>
